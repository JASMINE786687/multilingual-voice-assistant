<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAANI Login</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans&display=swap" rel="stylesheet">

<style>
body{
  font-family:'DM Sans';
  background:#020817;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:#0d1425;
  padding:25px;
  border-radius:15px;
}

.logo{
  text-align:center;
  font-size:32px;
  font-family:'Syne';
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ff88,#00b4ff);
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}
.msg{margin-top:10px;font-size:13px;}
</style>
</head>

<body>

<div class="box">
<div class="logo">VAANI</div>

<!-- STEP 1 -->
<div id="step1">
<input id="name" placeholder="Enter name">
<input id="phone" placeholder="Enter phone">
<button onclick="sendOTP()">Send OTP</button>
<div id="msg1" class="msg"></div>
</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">
<p id="phoneDisplay"></p>
<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
<button onclick="resendOTP()">Resend</button>
<div id="msg2" class="msg"></div>
</div>

</div>

<script>
// 🔥 YOUR BACKEND URL
const BACKEND = "https://multilingual-voice-assistant-870k.onrender.com";

// MESSAGE HELPER
function msg(id,text){
  document.getElementById(id).innerText=text;
}

// SEND OTP
async function sendOTP(){
  const phone = document.getElementById("phone").value.trim();
  const name  = document.getElementById("name").value.trim();

  if(phone.length < 10){
    msg("msg1","Enter valid number");
    return;
  }

  try{
    const res = await fetch(BACKEND + "/send_otp",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ phone, name })
    });

    const data = await res.json();

    if(!data.success){
      msg("msg1", data.message);
      return;
    }

    localStorage.setItem("temp_phone", data.phone);
    localStorage.setItem("temp_name", name);

    document.getElementById("phoneDisplay").innerText = data.phone;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");

    msg("msg1","OTP Sent");

  }catch(e){
    msg("msg1","Server error");
  }
}

// VERIFY OTP
async function verifyOTP(){
  const otp   = document.getElementById("otp").value.trim();
  const phone = localStorage.getItem("temp_phone");
  const name  = localStorage.getItem("temp_name");

  if(otp.length < 6){
    msg("msg2","Enter OTP");
    return;
  }

  try{
    const res = await fetch(BACKEND + "/verify_otp",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ phone, otp, name })
    });

    const data = await res.json();

    if(!data.success){
      msg("msg2", data.message);
      return;
    }

    // SAVE LOGIN
    localStorage.setItem("vaani_token", data.token);
    localStorage.setItem("vaani_user", JSON.stringify(data.user));

    msg("msg2","Login success");

    setTimeout(()=>{
      window.location.href="index.html";
    },1000);

  }catch(e){
    msg("msg2","Server error");
  }
}

// RESEND OTP
async function resendOTP(){
  const phone = localStorage.getItem("temp_phone");
  const name  = localStorage.getItem("temp_name");

  try{
    const res = await fetch(BACKEND + "/send_otp",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ phone, name })
    });

    const data = await res.json();

    msg("msg2", data.message);

  }catch(e){
    msg("msg2","Error resending OTP");
  }
}
</script>

</body>
</html>
