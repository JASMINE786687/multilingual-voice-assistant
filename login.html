<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAANI — Login</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    /* (YOUR FULL CSS — unchanged) */
    :root {
      --bg: #020817; --card: #0d1425;
      --accent: #00ff88; --accent2: #00b4ff;
      --text: #f0f6ff; --muted: #6b8cba;
      --border: #1e3a5f; --error: #ff6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 420px; }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 800;
      text-align: center; margin-bottom: 6px;
      background: linear-gradient(135deg, #00ff88, #00b4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 32px;
    }
    .form-group { margin-bottom: 16px; }
    input {
      width: 100%; padding: 13px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }
    .submit-btn {
      width: 100%; padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #00ff88, #00b4ff);
      font-weight: 800;
      cursor: pointer;
    }
    .otp-row { display: flex; gap: 8px; }
    .otp-box { flex:1; text-align:center; font-size:20px; }
    .msg { text-align:center; margin-top:10px; }
    .hidden { display:none; }
  </style>
</head>

<body>

<div class="container">
  <div class="logo">VAANI.</div>
  <p class="logo-sub">Voice Assistant for Government Services</p>

  <div class="card">

    <!-- STEP 1 -->
    <div id="step1">
      <div class="form-group">
        <input type="text" id="inputName" placeholder="Your name (optional)"/>
      </div>

      <div class="form-group">
        <input type="tel" id="inputPhone" placeholder="Enter 10-digit number" maxlength="10"/>
        <div id="recaptcha-container"></div>
      </div>

      <button class="submit-btn" onclick="sendOTP()">Get OTP →</button>
      <div class="msg" id="msg1"></div>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
      <p id="phoneDisplay"></p>

      <div class="otp-row">
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
      </div>

      <button class="submit-btn" onclick="verifyOTP()">Verify & Login →</button>
      <div class="msg" id="msg2"></div>
    </div>

  </div>
</div>

<script>
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyA89l0ax8wB2J4UKXWcesntiTveueBsuDc",
  authDomain: "vaani-otp.firebaseapp.com",
  projectId: "vaani-otp",
  storageBucket: "vaani-otp.firebasestorage.app",
  messagingSenderId: "1030946884076",
  appId: "1:1030946884076:web:26a5efde02d30165f058c9"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

/* GLOBAL */
let currentPhone = "";

/* MESSAGE */
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.innerText = text;
}

/* SEND OTP */
function sendOTP() {
  const phone = document.getElementById("inputPhone").value;

  if (phone.length !== 10) {
    showMsg("msg1", "Enter valid number");
    return;
  }

  const appVerifier = new firebase.auth.RecaptchaVerifier(
    'recaptcha-container',
    { size: 'invisible' }
  );

  auth.signInWithPhoneNumber("+91" + phone, appVerifier)
    .then((confirmationResult) => {
      window.confirmationResult = confirmationResult;

      currentPhone = "+91" + phone;
      document.getElementById("phoneDisplay").innerText = currentPhone;

      document.getElementById("step1").classList.add("hidden");
      document.getElementById("step2").classList.remove("hidden");

      showMsg("msg1", "OTP Sent!");
    })
    .catch((error) => {
      showMsg("msg1", error.message);
    });
}

/* VERIFY OTP */
function verifyOTP() {
  const boxes = document.querySelectorAll(".otp-box");
  const code = Array.from(boxes).map(b => b.value).join("");

  if (code.length !== 6) {
    showMsg("msg2", "Enter full OTP");
    return;
  }

  confirmationResult.confirm(code)
    .then((result) => {
      const user = result.user;

      localStorage.setItem("vaani_token", "firebase_auth");
      localStorage.setItem("vaani_user", JSON.stringify({
        name: "User",
        phone: user.phoneNumber
      }));

      showMsg("msg2", "Login Success!");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    })
    .catch(() => {
      showMsg("msg2", "Invalid OTP");
    });
}
</script>

</body>
</html>
