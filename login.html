<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAANI Login</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><style>
body{
  font-family:'DM Sans';
  background:#020817;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:#0d1425;
  padding:25px;
  border-radius:15px;
}

.logo{
  text-align:center;
  font-size:32px;
  font-family:'Syne';
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#00ff88,#00b4ff);
  font-weight:bold;
  cursor:pointer;
}

.hidden{display:none;}
.msg{margin-top:10px;font-size:13px;}
</style></head><body><div class="box">
<div class="logo">VAANI</div><div id="step1">
<input id="name" placeholder="Enter name">
<input id="phone" placeholder="Enter phone">
<div id="recaptcha-container"></div>
<button onclick="sendOTP()">Send OTP</button>
<div id="msg1" class="msg"></div>
</div><div id="step2" class="hidden">
<p id="phoneDisplay"></p>
<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
<button onclick="resendOTP()">Resend</button>
<div id="msg2" class="msg"></div>
</div></div><script>
const firebaseConfig={
apiKey:"AIzaSyA89l0ax8wB2J4UKXWcesntiTveueBsuDc",
authDomain:"vaani-otp.firebaseapp.com",
projectId:"vaani-otp",
storageBucket:"vaani-otp.firebasestorage.app",
messagingSenderId:"1030946884076",
appId:"1:1030946884076:web:26a5efde02d30165f058c9"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

let confirmationResult=null;
let recaptchaVerifier=null;
let recaptchaWidgetId=null;

function msg(id,t){document.getElementById(id).innerText=t;}

async function sendOTP(){
let phone=document.getElementById("phone").value;
let name=document.getElementById("name").value;

if(phone.length<10){msg("msg1","Enter valid number");return;}

let full="+91"+phone;

try{
if(!recaptchaVerifier){
recaptchaVerifier=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"invisible"});
recaptchaWidgetId=await recaptchaVerifier.render();
}else{
grecaptcha.reset(recaptchaWidgetId);
}

confirmationResult=await auth.signInWithPhoneNumber(full,recaptchaVerifier);

localStorage.setItem("name",name);

document.getElementById("phoneDisplay").innerText=full;
document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");

msg("msg1","OTP Sent");

}catch(e){msg("msg1",e.message);}
}

async function verifyOTP(){
let code=document.getElementById("otp").value;

if(!confirmationResult){msg("msg2","Send OTP first");return;}

try{
let result=await confirmationResult.confirm(code);
let user=result.user;

localStorage.setItem("vaani_token",user.uid);
localStorage.setItem("vaani_user",JSON.stringify({
name:localStorage.getItem("name"),
phone:user.phoneNumber
}));

msg("msg2","Login success");

setTimeout(()=>{window.location.href="index.html";},1000);

}catch(e){msg("msg2","Invalid OTP");}
}

async function resendOTP(){
let phone=document.getElementById("phoneDisplay").innerText;

try{
grecaptcha.reset(recaptchaWidgetId);
confirmationResult=await auth.signInWithPhoneNumber(phone,recaptchaVerifier);
msg("msg2","OTP resent");
}catch(e){msg("msg2",e.message);}
}
</script></body>
</html>
